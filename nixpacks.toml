# Nixpacks configuration for Railway deployment
# Using Node.js 22 (available in Nixpacks)
# eslint-visitor-keys pinned to 4.x via package.json overrides

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.build]
cmds = [
  "npm cache clean --force",
  "npm ci --prefer-offline",
  "npm run build"
]

[start]
cmd = "npm run start"
